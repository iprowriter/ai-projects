# pytest.ini
[pytest]
pythonpath = projects/gateway
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session

# Filter out external deprecation warnings
filterwarnings =
    ignore::deprecation.DeprecationWarning:langchain_core.*
    ignore::starlette.util.StarletteDeprecationWarning:fastapi.*